# Runtime sysctls (init.d / init.theettam.rc / Magisk module)
# Research defaults — apply after boot

# Sched
kernel.sched_bore = 1

# Network — BBRv3 (registered as "bbr") + fair queueing
net.ipv4.tcp_congestion_control = bbr
net.core.default_qdisc = fq

# Optional: attach CAKE on uplink via tc, e.g.
#   tc qdisc replace dev wlan0 root cake bandwidth 100Mbit
