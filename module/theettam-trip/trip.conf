# Theettam Trip Mode — configuration
#
# enabled: master switch. 0 = do nothing at all.
enabled=1

# Wakelocks blocked while the screen is off. Semicolon separated.
#
# These are the modem DATA path: IPA is Qualcomm's IP Accelerator, rmnet is the
# modem's network interface. They wake the AP when a packet arrives -- FCM, sync,
# any background traffic. This is the list boeffla_wl_blocker.h ships as its
# default and never applies.
#
# NOT blocked, deliberately: the modem's control/paging path, which is how calls
# and SMS arrive, and alarmtimer/RTC, which is how alarms fire. Blocking those
# would mean missed calls -- if that is what you want, use airplane mode.
#
# Find your own with scripts/wakestat/wakestat.sh.
list=IPA_WS;IPA_CLIENT_APPS_WAN_COAL_CONS;IPA_CLIENT_APPS_WAN_LOW_LAT_CONS;IPA_CLIENT_APPS_LAN_CONS;rmnet_ipa%d;rmnet_ctl;RMNET_SHS;hal_bluetooth_lock

# Seconds between screen-state checks. Lower reacts faster and costs more.
poll=15

# Clear the blocklist while charging. Blocking is for battery; on a charger there
# is nothing to save and every reason to let messages through.
unblock_on_charger=1
