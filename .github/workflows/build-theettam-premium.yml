name: Theettam Premium CALLSAFE

on:
  workflow_dispatch:
  push:
    branches: [theettam-premium-sukisu]
    paths:
      - 'theettam/**'
      - 'scripts/susfs/**'
      - 'scripts/droidspaces/**'
      - 'kernel/sched/sched-pelt.h'
      - 'drivers/base/power/wakeup.c'
      - '.github/workflows/build-theettam-premium.yml'

concurrency:
  group: premium-${{ github.ref }}
  cancel-in-progress: true

jobs:
  premium-callsafe:
    name: CALLSAFE premium + KABI gate
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Sanity
        run: |
          grep -q '^SUBLEVEL = 175' Makefile || exit 1
          test -f scripts/droidspaces/droidspaces-callsafe.config
          test -f theettam/scripts/build_premium_sukisu.sh
          echo "HEAD=$(git rev-parse --short HEAD)"

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential flex bison libssl-dev libelf-dev bc cpio git python3 wget curl ccache pahole zip unzip

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-premium-cs-${{ hashFiles('Makefile', 'theettam/**', 'scripts/droidspaces/**') }}
          restore-keys: ccache-premium-

      - name: Clang r547379
        run: |
          rm -rf "$HOME/clang"
          git clone --depth=1 https://gitlab.com/kei-space/clang/r547379 "$HOME/clang"
          echo "$HOME/clang/bin" >> "$GITHUB_PATH"
          clang --version | head -1

      - name: Build CALLSAFE
        env:
          JOBS: "4"
          SKIP_DROIDSPACES: "0"
          PREMIUM_FULL_DS: "0"
          THEETTAM_CLANG: /home/runner/clang
        run: |
          export PATH="$HOME/clang/bin:$PATH"
          export THEETTAM_CLANG="$HOME/clang"
          bash theettam/scripts/build_premium_sukisu.sh

      - name: Package zip
        run: |
          set -euo pipefail
          test -f dist/Image-premium-sukisu
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git ak3
          cp -f dist/Image-premium-sukisu ak3/Image
          printf '%s\n' \
            '### AnyKernel3' \
            'properties() { ''' \
            'kernel.string=Theettam-Premium-CALLSAFE-noUSERNS' \
            'do.devicecheck=0' \
            'do.modules=0' \
            'do.systemless=0' \
            'do.cleanup=1' \
            'do.cleanuponabort=0' \
            'device.name1=peridot' \
            '''; }' \
            'block=boot' \
            'is_slot_device=auto' \
            'ramdisk_compression=auto' \
            'patch_vbmeta_flag=auto' \
            'no_magisk_check=1' \
            '. tools/ak3-core.sh' \
            'dump_boot' \
            'write_boot' \
            > ak3/anykernel.sh
          SHA=$(git rev-parse --short HEAD)
          ZIP="Theettam-Premium-CALLSAFE-noUSERNS-peridot-6.1.175-${SHA}.zip"
          (cd ak3 && zip -r9 "../dist/${ZIP}" Image anykernel.sh META-INF tools LICENSE.txt || zip -r9 "../dist/${ZIP}" Image anykernel.sh META-INF tools)
          ls -la dist/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: theettam-premium-callsafe
          path: |
            dist/Image-premium-sukisu
            dist/*.zip
            dist/PREMIUM_KABI_REPORT.md
            dist/kabi/**
            logs/**
          if-no-files-found: error