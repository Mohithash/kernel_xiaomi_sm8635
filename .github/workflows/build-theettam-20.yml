name: Theettam 2.0 — 4 root flavors on 6.1.175

# Builds all four root flavors on the peridot 6.1.175 base (ACK android14-6.1-lts
# merge + BORE + ADIOS). Each flavor is the SAME integration that boots on the
# 1.9-vali 6.1.173 base — the 11 fs files SUSFS patches are byte-identical between
# 173 and 175, so the port carries over unchanged. Only the base moved.
#
#   ksun-plain      KernelSU-Next v3.3.0, no SUSFS
#   ksun-susfs      KernelSU-Next v3.3.0 + SUSFS v2.2.0   (hand-port, scripts/susfs/integrate.sh)
#   sukisu-susfs    SukiSU-Ultra + SUSFS v2.2.0           (same graft; shares weishu new-tree kprobe arch)
#   resukisu-susfs  ReSukiSU + SUSFS v2.2.0               (native driver side; fs-side only)
#   premium         SukiSU-Ultra + SUSFS + DroidSpaces    (all-in-one; BTF on)
# Note: KPM is NOT offered — every current SukiSU-Ultra branch/release ships KPM
# as non-functional stubs, so advertising it would mislead. Do not re-add it.

on:
  workflow_dispatch:
  push:
    branches: [ peridot-6.1.175 ]
    paths-ignore: [ '**/*.md' ]

concurrency:
  group: theettam20-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SUSFS_PIN: 8199bb6534174117ad907f726231484872ac345a   # susfs4ksu gki-android14-6.1 @ v2.2.0
  KBUILD_BUILD_USER: build
  KBUILD_BUILD_HOST: localhost

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: ksun-plain
            label: KernelSU-Next v3.3.0 (plain)
            repo: https://github.com/KernelSU-Next/KernelSU-Next
            clone_args: --depth=1 --branch v3.3.0
            pin: ''
            susfs: none
            kpm: 'false'
            zipname: KSUN3.3.0
          - id: ksun-susfs
            label: KernelSU-Next v3.3.0 + SUSFS v2.2.0
            repo: https://github.com/KernelSU-Next/KernelSU-Next
            clone_args: --depth=1 --branch v3.3.0
            pin: ''
            susfs: shim
            script: integrate.sh
            kpm: 'false'
            zipname: KSUN3.3.0-SUSFS2.2.0
          - id: sukisu-susfs
            label: SukiSU-Ultra + SUSFS v2.2.0
            repo: https://github.com/SukiSU-Ultra/SukiSU-Ultra
            clone_args: -b susfs_new
            pin: 278d822a4ebd214bcfd774b7910cb11cdc560bb9
            susfs: shim
            script: integrate-sukisu.sh
            kpm: 'false'
            zipname: SukiSU-Ultra-SUSFS2.2.0
          - id: ksun-susfs-droidspaces
            label: KernelSU-Next + SUSFS + DroidSpaces (experimental)
            repo: https://github.com/KernelSU-Next/KernelSU-Next
            clone_args: --depth=1 --branch v3.3.0
            pin: ''
            susfs: shim
            script: integrate.sh
            droidspaces: 'true'
            kpm: 'false'
            zipname: KSUN3.3.0-SUSFS2.2.0-DroidSpaces-EXPERIMENTAL
          - id: resukisu-susfs
            label: ReSukiSU + SUSFS v2.2.0 (native)
            repo: https://github.com/ReSukiSU/ReSukiSU
            clone_args: ''
            pin: aa32736680c91705ef68ab634cf276a7c42612d4
            susfs: native
            kpm: 'false'
            zipname: ReSukiSU-SUSFS2.2.0
          # 6th flavor: everything in one Image — SukiSU-Ultra root (same pin as
          # sukisu-susfs) + SUSFS v2.2.0 + DroidSpaces containers. Built the same
          # way as the flavors that boot on device (BTF stays on -> VoLTE works;
          # SYSVIPC relocated into KABI reserve).
          - id: premium
            label: SukiSU-Ultra + SUSFS + DroidSpaces (premium)
            repo: https://github.com/SukiSU-Ultra/SukiSU-Ultra
            clone_args: -b susfs_new
            pin: 278d822a4ebd214bcfd774b7910cb11cdc560bb9
            susfs: shim
            script: integrate-sukisu.sh
            droidspaces: 'true'
            kpm: 'false'
            zipname: Theettam-Premium-SukiSU-SUSFS-DroidSpaces

    name: ${{ matrix.label }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: peridot-6.1.175
          fetch-depth: 1

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bc bison flex build-essential \
            libssl-dev libncurses-dev libelf-dev zlib1g-dev pkg-config git curl zip cpio \
            kmod python3 ccache lld llvm dwarves zstd

      - uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-t20-${{ matrix.id }}-${{ github.sha }}
          restore-keys: |
            ccache-t20-${{ matrix.id }}-
            ccache-peridot175-
      - id: clang
        uses: actions/cache@v4
        with:
          path: ~/clang
          key: clang-neutron-30062026
      - name: Neutron clang 30062026 (Track C — replaces kei r547379)
        if: steps.clang.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          rm -rf "$HOME/clang"; mkdir -p "$HOME/clang"; cd "$HOME/clang"
          curl -LSsO https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman
          chmod +x antman
          ./antman -S=30062026        # pinned Neutron build (sha256-verified by antman)
          ./antman --patch=glibc      # host glibc compatibility
      - run: |
          echo "$HOME/clang/bin" >> "$GITHUB_PATH"
          "$HOME/clang/bin/clang" --version | head -1

      - name: Sanity — base must be 6.1.175
        run: |
          set -euo pipefail
          grep -q '^SUBLEVEL = 175' Makefile || { echo "::error::base is not 6.1.175"; exit 1; }
          grep -q '^CONFIG_SCHED_BORE=y' arch/arm64/configs/gki_defconfig || { echo "::error::BORE missing"; exit 1; }
          grep -q '^CONFIG_MQ_IOSCHED_ADIOS=y' arch/arm64/configs/gki_defconfig || { echo "::error::ADIOS missing"; exit 1; }
          echo "✅ base 6.1.175 + BORE + ADIOS"

      - name: Fetch root driver (${{ matrix.id }})
        run: |
          set -euo pipefail
          git clone ${{ matrix.clone_args }} "${{ matrix.repo }}" KernelSU
          if [ -n "${{ matrix.pin }}" ]; then git -C KernelSU checkout "${{ matrix.pin }}"; fi
          echo "[i] driver @ $(git -C KernelSU rev-parse --short HEAD)  (${{ matrix.repo }})"
          # SukiSU derives KSU_VERSION from `git rev-list --count main` (VERSION_BASE
          # 40000 + count - 2815). We clone susfs_new, so there is no local 'main' ref
          # and the count fails, dropping to the literal fallback 13000 — which makes
          # the manager think the driver is ancient. Point main at HEAD (susfs_new ==
          # main) with full history so the real version (~40000+) is emitted.
          if grep -q 'REPO_BRANCH := main' KernelSU/kernel/Kbuild 2>/dev/null; then
            if [ "$(git -C KernelSU rev-parse --is-shallow-repository)" = "true" ]; then
              git -C KernelSU fetch --unshallow --quiet || git -C KernelSU fetch --depth=100000 --quiet || true
            fi
            git -C KernelSU branch -f main HEAD
            _cnt=$(git -C KernelSU rev-list --count main)
            echo "[i] SukiSU version: count(main)=${_cnt} -> KSU_VERSION=$(expr 40000 + ${_cnt} - 2815)"
            [ "$(expr 40000 + ${_cnt} - 2815)" -gt 30000 ] || { echo "::error::SukiSU version still low — count path broken"; exit 1; }
          fi

      - name: Fetch susfs4ksu v2.2.0 (pinned)
        if: matrix.susfs != 'none'
        run: |
          set -euo pipefail
          git clone -b gki-android14-6.1 https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu
          git -C susfs4ksu checkout "$SUSFS_PIN"
          V="$(sed -n 's/.*SUSFS_VERSION[^"]*"\([^"]*\)".*/\1/p' susfs4ksu/kernel_patches/include/linux/susfs.h)"
          echo "[i] SUSFS $V @ ${SUSFS_PIN:0:9}"
          [ "$V" = "v2.2.0" ] || { echo "::error::expected SUSFS v2.2.0, got $V"; exit 1; }

      - name: Wire driver into the kernel tree
        run: |
          set -euo pipefail
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q 'drivers/kernelsu/Kconfig' drivers/Kconfig || sed -i '/^endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig
          grep -q 'obj-$(CONFIG_KSU)' drivers/Makefile || printf '\nobj-$(CONFIG_KSU) += kernelsu/\n' >> drivers/Makefile

      - name: Integrate SUSFS v2.2.0 — driver graft + fs-side
        if: matrix.susfs == 'shim'
        run: |
          set -euo pipefail
          # Each flavor uses the exact script its BOOTING 1.9-vali build used:
          #   KSUN   -> integrate.sh        (anchors reply=arg4 / utsname.h)
          #   SukiSU -> integrate-sukisu.sh (anchors magic2=PT_REGS_PARM2 / version.h)
          bash "scripts/susfs/${{ matrix.script }}" "$PWD/KernelSU" "$PWD/susfs4ksu" "$PWD"
          if find . -name '*.rej' | grep -q .; then echo "::error::rejects present"; find . -name '*.rej' -exec cat {} +; exit 1; fi

      - name: Integrate SUSFS v2.2.0 — fs-side only (native driver)
        if: matrix.susfs == 'native'
        run: |
          set -euo pipefail
          bash scripts/susfs/integrate-native.sh "$PWD/susfs4ksu" "$PWD"
          if find . -name '*.rej' | grep -q .; then echo "::error::rejects present"; find . -name '*.rej' -exec cat {} +; exit 1; fi

      - name: Integrate DroidSpaces — relocate SYSVIPC out of task_struct
        if: matrix.droidspaces == 'true'
        run: |
          set -euo pipefail
          bash scripts/droidspaces/integrate.sh "$PWD"
          # The relocation is the whole ballgame: if sysvsem/sysvshm are still declared
          # in their original position, every vendor module reads shifted offsets.
          grep -q 'ANDROID_KABI_USE(6, struct sysv_sem sysvsem)' include/linux/sched.h \
            || { echo "::error::SYSVIPC relocation missing"; exit 1; }
          grep -qE '^\s*/\* struct sysv_sem' include/linux/sched.h \
            || { echo "::error::original sysvsem declaration still live"; exit 1; }
          echo "✅ SYSVIPC relocated into KABI reserve slots 6/7/8"

      - name: Configure + build
        run: |
          set -euo pipefail
          export ARCH=arm64 SUBARCH=arm64 PATH="$HOME/clang/bin:$PATH"
          make -j"$(nproc --all)" O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 gki_defconfig
          C=./scripts/config
          $C --file out/.config -e KSU
          if [ "${{ matrix.kpm }}" = "true" ]; then
            # KPM must be a REAL Kconfig symbol (SukiSU sources 'config KPM'), else
            # -e writes it and olddefconfig silently drops it -> KPM-less zip.
            grep -rqE "^\s*config KPM\s*$" --include=Kconfig . \
              || { echo "::error::CONFIG_KPM is not a Kconfig symbol in this tree (SukiSU KPM not sourced)"; exit 1; }
            $C --file out/.config -e KPM
          fi
          if [ "${{ matrix.susfs }}" != "none" ]; then
            for o in KSU_SUSFS KSU_SUSFS_SUS_PATH KSU_SUSFS_SUS_MOUNT KSU_SUSFS_SUS_KSTAT \
                     KSU_SUSFS_SPOOF_UNAME KSU_SUSFS_ENABLE_LOG KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS \
                     KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG KSU_SUSFS_OPEN_REDIRECT KSU_SUSFS_SUS_MAP; do
              $C --file out/.config -e "$o"; done
          fi
          if [ "${{ matrix.droidspaces }}" = "true" ]; then
            for o in $(grep -v '^#' scripts/droidspaces/droidspaces.config); do
              # A name that is not a real Kconfig symbol enables nothing and says nothing;
              # scripts/config happily writes CONFIG_MADE_UP=y and olddefconfig drops it.
              grep -rqE "^\s*(menu)?config $o\s*$" --include=Kconfig . \
                || { echo "::error::CONFIG_$o is not a Kconfig symbol in this tree"; exit 1; }
              $C --file out/.config -e "$o"; done
          fi
          make -j"$(nproc --all)" O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig

          echo "=== config verification ==="
          grep -E '^CONFIG_KSU=y' out/.config || { echo "::error::KSU not enabled"; exit 1; }
          grep -E '^CONFIG_SCHED_BORE=y' out/.config || { echo "::error::BORE not enabled"; exit 1; }
          grep -E '^CONFIG_MQ_IOSCHED_ADIOS=y' out/.config || { echo "::error::ADIOS not enabled"; exit 1; }
          # Track A memory tuning — must survive olddefconfig (DAMON_RECLAIM/LRU_SORT need DAMON_PADDR)
          for o in DAMON_PADDR DAMON_RECLAIM DAMON_LRU_SORT ZRAM_WRITEBACK BOEFFLA_WL_BLOCKER; do
            grep -qE "^CONFIG_$o=(y|m)" out/.config || { echo "::error::CONFIG_$o dropped in olddefconfig"; exit 1; }
          done
          if [ "${{ matrix.susfs }}" != "none" ]; then
            grep -E '^CONFIG_KSU_SUSFS.*=y' out/.config | tee /tmp/susfscfg
            test -s /tmp/susfscfg || { echo "::error::SUSFS not enabled in .config"; exit 1; }
          fi
          if [ "${{ matrix.kpm }}" = "true" ]; then grep -E '^CONFIG_KPM=y' out/.config || { echo "::error::KPM flavor but CONFIG_KPM=y dropped in olddefconfig — zip would ship without KPM"; exit 1; }; fi
          if [ "${{ matrix.droidspaces }}" = "true" ]; then
            miss=0
            for o in $(grep -v '^#' scripts/droidspaces/droidspaces.config); do
              # Accept =m as well as =y: a tristate whose dependency is modular is
              # correctly demoted by kconfig, and that is still enabled.
              grep -qE "^CONFIG_$o=(y|m)" out/.config || { echo "::error::CONFIG_$o did not enable"; miss=1; }
            done
            [ "$miss" = "0" ] || exit 1
            echo "✅ all 11 DroidSpaces options enabled"
          fi

          export KBUILD_COMPILER_STRING="$(clang --version | head -n1)"
          make -j"$(nproc --all)" O=out ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="ccache clang" 2>&1 | tee build.log

      - name: Package flashable zip
        run: |
          set -euo pipefail
          IMG=out/arch/arm64/boot/Image; [ -f "$IMG" ] || { echo "::error::no Image"; exit 1; }
          rm -rf AnyKernel3; cp -r anykernel AnyKernel3; cp "$IMG" AnyKernel3/Image
          VER="$(cat out/include/config/kernel.release 2>/dev/null || echo 6.1.175)"
          ZIP="Theettam-2.0-${{ matrix.zipname }}-peridot-${VER}.zip"
          ( cd AnyKernel3 && zip -r9 "../$ZIP" . -x '.git*' )
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"
          echo "KREL=$VER" >> "$GITHUB_ENV"
          echo "✅ $ZIP  ($(stat -c%s "$ZIP") bytes, kernel.release=$VER)"

      - uses: actions/upload-artifact@v4
        with:
          name: zip-${{ matrix.id }}
          path: ${{ env.ZIP }}
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: log-${{ matrix.id }}
          path: build.log
          if-no-files-found: ignore

  release:
    needs: build
    # Publish only on a deliberate manual run. A plain push to this branch builds and
    # compile-verifies the four flavors but must not mint a release of its own.
    if: success() && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: zip-*
          path: zips
          merge-multiple: true
      - run: ls -lh zips/
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ci-2.0-${{ github.run_number }}
          prerelease: true
          name: 2.0 CI build #${{ github.run_number }} (compile-verified, untested)
          body: |
            > [!IMPORTANT]
            > **CI test build, not a release. Most people want the latest published release** —
            > those are boot-tested. This is compile-verified only.

            Built from `${{ github.sha }}` on `peridot-6.1.175`. Flash only if you mean to test
            this build, with a backup and fastboot recovery ready.
          files: zips/*.zip
