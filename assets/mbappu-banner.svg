<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="Theettam Kernel - Mbappu Edition - peridot SM8635">
  <defs>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b2f1a"/>
      <stop offset="0.55" stop-color="#062012"/>
      <stop offset="1" stop-color="#010a06"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff3b0"/>
      <stop offset="0.5" stop-color="#f4c430"/>
      <stop offset="1" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38f9d7"/>
      <stop offset="1" stop-color="#43a5ff"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.15" r="0.9">
      <stop offset="0" stop-color="#1f6b3f" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- pitch -->
  <rect width="1280" height="340" fill="url(#pitch)"/>
  <rect width="1280" height="340" fill="url(#spot)"/>
  <!-- mowing stripes -->
  <g fill="#ffffff" opacity="0.03">
    <rect x="0"    width="160" height="340"/>
    <rect x="320"  width="160" height="340"/>
    <rect x="640"  width="160" height="340"/>
    <rect x="960"  width="160" height="340"/>
  </g>
  <!-- pitch markings -->
  <g stroke="#7ef7c4" stroke-width="2" fill="none" opacity="0.18">
    <line x1="640" y1="0" x2="640" y2="340"/>
    <circle cx="640" cy="170" r="86"/>
    <circle cx="640" cy="170" r="4" fill="#7ef7c4" stroke="none"/>
    <rect x="0" y="70" width="120" height="200"/>
    <rect x="1160" y="70" width="120" height="200"/>
  </g>

  <!-- speed streaks -->
  <g stroke="url(#neon)" stroke-width="3" opacity="0.5" stroke-linecap="round">
    <line x1="150" y1="250" x2="330" y2="250"/>
    <line x1="120" y1="266" x2="270" y2="266"/>
    <line x1="180" y1="234" x2="300" y2="234"/>
  </g>

  <!-- football -->
  <g transform="translate(232,168)">
    <circle r="58" fill="#f6f6f2" stroke="#0a0a0a" stroke-width="3"/>
    <g fill="#0a0a0a">
      <polygon points="0,-22 21,-7 13,18 -13,18 -21,-7"/>
      <polygon points="0,-58 14,-46 6,-30 -6,-30 -14,-46" opacity="0.9"/>
      <polygon points="52,-16 40,2 24,-8 30,-28 48,-30" opacity="0.9"/>
      <polygon points="-52,-16 -48,-30 -30,-28 -24,-8 -40,2" opacity="0.9"/>
      <polygon points="34,44 16,38 22,20 40,22 44,38" opacity="0.9"/>
      <polygon points="-34,44 -44,38 -40,22 -22,20 -16,38" opacity="0.9"/>
    </g>
  </g>

  <!-- wordmark -->
  <g font-family="Arial Black, Arial, Helvetica, sans-serif" text-anchor="start">
    <text x="360" y="150" font-size="96" font-weight="900" fill="#f6fffb" letter-spacing="2">THEETTAM</text>
    <text x="362" y="150" font-size="96" font-weight="900" fill="url(#neon)" opacity="0.25" filter="url(#soft)" letter-spacing="2">THEETTAM</text>
    <text x="364" y="224" font-size="64" font-weight="900" fill="url(#gold)" letter-spacing="3">MBAPPU EDITION</text>
    <text x="366" y="272" font-size="24" font-weight="700" fill="#8fe9c4" letter-spacing="6">peridot &#183; SM8635 &#183; GKI 6.1.175 &#183; the 🐐</text>
  </g>

  <!-- jersey number -->
  <g transform="translate(1120,180)" text-anchor="middle" font-family="Arial Black, Arial, sans-serif">
    <circle r="92" fill="#03150c" stroke="url(#gold)" stroke-width="4" opacity="0.9"/>
    <text y="42" font-size="118" font-weight="900" fill="url(#gold)">10</text>
  </g>
</svg>
